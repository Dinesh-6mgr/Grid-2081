<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>PDF Download Website</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body class="body">
  <header>
    <nav class="a">
      <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
    </nav>

    <div class="sidebar" id="sidebar">
      <h3>Menu</h3>
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="../html/nur.html">Nursery</a></li>
        <li><a href="../html/kg.html">KG</a></li>
        <li><a href="class1.html">Class 1</a></li>
        <!-- Add other classes as needed -->
      </ul>
    </div>
  </header>

  <div class="left">
    <img src="../image/logo.png" style="width:80px; height: 80px; margin: 0px 0px 0px 130px; align-items: center;">
  </div>

  <div class="m">
    <div class="container mt-4">
      <h2 class="text-center">Download Grid of Class One</h2>
      <div class="row justify-content-center">

        <!-- Example Card -->
        <div class="col-md-4">
          <div class="card mb-3">
            <img src="../image/Image.png" class="card-img-top" alt="Book Image">
            <div class="card-body text-center">
              <h5><b>Class One</b></h5>
              <p>Math</p>
              <a href="../Gride-2081/class 1/Math.pdf" class="btn btn-primary mb-2" download>Download PDF</a><br>
              <button onclick="viewPDF('Gride-2081/class 1/Math.pdf')" class="btn btn-outline-secondary">View PDF</button>
            </div>
          </div>
        </div>

        <!-- Add more subjects below as needed -->

      </div>
    </div>

    <!-- PDF Viewer Section -->
    <section id="pdfSection" class="container mt-4" style="display: none;">
      <h4 class="text-center mb-3">📄 Viewing PDF</h4>
      <iframe id="pdfViewer" width="100%" height="600px" style="border: 1px solid #ccc; border-radius: 10px;"></iframe>
    </section>

    <!-- Footer -->
    <footer style="background-color: #2D336B; color: white; text-align: center; padding: 15px; margin-top: 20px;">
      <p>&copy; 2025 Shree Jana Jyoti Namuna Secondary School. All Rights Reserved.</p>
    </footer>
  </div>

  <!-- JS -->
  <script>
    function toggleSidebar() {
      let sidebar = document.getElementById("sidebar");
      sidebar.classList.toggle("show");
    }

    function viewPDF(pdfPath) {
      const baseURL = location.origin;
      const fullPath = baseURL + "/" + pdfPath;
      const encodedPath = encodeURIComponent(fullPath);
      const viewerUrl = "https://docs.google.com/gview?embedded=true&url=" + encodedPath;

      document.getElementById("pdfViewer").src = viewerUrl;
      document.getElementById("pdfSection").style.display = "block";
      window.scrollTo({ top: document.getElementById("pdfSection").offsetTop, behavior: "smooth" });
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
