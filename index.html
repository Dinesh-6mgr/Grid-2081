<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My School App</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <!-- Android Theme Color -->
    <meta name="theme-color" content="#4f8bf9">

    <!-- iOS Web App Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="image/logo.png">

    <!-- Stylesheets & Scripts -->
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

    <!-- For enabling PWA installation popup -->
    <link rel="icon" href="image/logo.png">
</head>

<body>
    <!-- Navbar -->
    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#news">News</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Content Section -->
    <div class="main-content">
        <!-- Map and News Content -->
        <div id="news">
            <!-- Example of News Articles with Hover -->
            <div class="news-article">
                <img src="image/article.jpg" alt="Article Image">
                <h3>Article Title</h3>
                <p class="date">Published on: April 28, 2025</p>
                <p class="summary">This is a brief summary of the article...</p>
                <a href="#" class="read-more">Read more</a>
            </div>
        </div>
        
        <!-- Map Section -->
        <div id="map">
            <iframe src="https://maps.google.com/maps?q=Kathmandu&t=&z=13&ie=UTF8&iwloc=&output=embed" 
                width="100%" height="400" frameborder="0" style="border:0;" allowfullscreen="" aria-hidden="false" tabindex="0"></iframe>
        </div>
    </div>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2025 My School App. All rights reserved.</p>
    </footer>

    <!-- PWA Installation Code (JavaScript) -->
    <script>
        let deferredPrompt;
        const installButton = document.createElement('button');
        installButton.textContent = 'Install App';
        installButton.style.position = 'fixed';
        installButton.style.bottom = '20px';
        installButton.style.left = '20px';
        installButton.style.padding = '10px';
        installButton.style.background = '#4f8bf9';
        installButton.style.color = 'white';
        installButton.style.border = 'none';
        installButton.style.borderRadius = '5px';
        installButton.style.cursor = 'pointer';

        // Display the install button if the PWA is ready
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); // Prevent the default prompt
            deferredPrompt = e; // Save the event for later
            document.body.appendChild(installButton);
        });

        installButton.addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt(); // Show the install prompt
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                    } else {
                        console.log('User dismissed the install prompt');
                    }
                });
            }
        });

        // Hiding install button after app is installed
        window.addEventListener('appinstalled', () => {
            installButton.style.display = 'none';
        });

        // Hide the Chrome navigation bar on load for PWA
        window.addEventListener("load", () => {
            if (window.matchMedia('(display-mode: standalone)').matches) {
                document.body.style.margin = '0';
                window.scrollTo(0, 1); // Scrolls the page slightly to hide the browser UI
            }
        });

        // Service Worker registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then((registration) => {
                    console.log('Service Worker registered:', registration);
                })
                .catch((error) => {
                    console.log('Service Worker registration failed:', error);
                });
        }
    </script>
</body>

</html>
