<!-- News Section -->
<div id="news-container" class="news-container"></div> <!-- This is where your articles will go -->

<!-- Pagination for news -->
<div class="pagination">
    <button id="next-button" class="next-btn" style="display:none;">View Next 3 News</button>
</div>

<script>
    let currentIndex = 0;  // Track the current set of articles being shown
    const articlesPerPage = 3;  // Number of articles to show per page

    fetch('articles.json')
      .then(response => response.json())
      .then(articles => {
        const container = document.getElementById('news-container');

        function showArticles(startIndex) {
            container.innerHTML = '';  // Clear the current articles
            const articlesToShow = articles.slice(startIndex, startIndex + articlesPerPage);
            articlesToShow.forEach(article => {
              const articleHTML = `
                <div class="news-article">
                  <img src="${article.image}" alt="${article.title}" class="news-image">
                  <div class="news-content">
                    <h3><a href="${article.link}" class="news-title">${article.title}</a></h3>
                    <p class="date">Published on: ${article.date}</p>
                    <p class="summary">${article.summary}</p>
                    <a href="${article.link}" class="read-more">Read More...</a>
                  </div>
                </div>
              `;
              container.innerHTML += articleHTML;  // Add the article to the container
            });

            // Hide or show the "Next" button depending on whether there are more articles to load
            const nextButton = document.getElementById('next-button');
            if (currentIndex + articlesPerPage < articles.length) {
              nextButton.style.display = 'block';  // Show the "Next" button
            } else {
              nextButton.style.display = 'none';  // Hide the "Next" button if no more articles
            }
        }

        // Show the first set of articles
        showArticles(currentIndex);

        // Handle the "Next" button click
        document.getElementById('next-button').addEventListener('click', () => {
          currentIndex += articlesPerPage;
          showArticles(currentIndex);
        });
      })
      .catch(error => console.error('Error loading articles:', error));
</script>
