<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0B1437">
  <title>Offline - Grid 2081</title>
  <link rel="icon" href="image/logo.png">
  <link rel="stylesheet" href="style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; background:linear-gradient(180deg,#eef4ff,#f4f6fb); }
    .offline-card { max-width:520px; width:100%; margin:20px; padding:32px; border-radius:24px; background:rgba(255,255,255,0.96); box-shadow:0 24px 60px rgba(11,20,55,0.08); border:1px solid rgba(79,139,249,0.12); }
    .offline-card h1 { margin:0 0 12px; font-size:2rem; color:#0B1437; }
    .offline-card p { margin:0 0 20px; color:#475674; line-height:1.7; }
    .offline-card a { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:14px 20px; border-radius:14px; background:#4f8bf9; color:#fff; text-decoration:none; font-weight:700; }
  </style>
</head>
<body>
  <div class="offline-card">
    <h1>You're offline</h1>
    <p>The app shell is still available. Browse pages you've visited already, or return home to continue using the site offline.</p>
    <a href="index.html">Back to Home</a>
  </div>
</body>
</html>
